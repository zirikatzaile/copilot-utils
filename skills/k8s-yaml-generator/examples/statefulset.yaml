apiVersion: v1
kind: Service
metadata:
  name: my-db-headless
  namespace: default
  labels:
    app.kubernetes.io/name: my-db
    app.kubernetes.io/instance: my-db
    app.kubernetes.io/part-of: my-app
    app.kubernetes.io/managed-by: kubectl
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: my-db
  ports:
  - name: db
    port: 5432
    targetPort: db
    protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: my-db
  namespace: default
  labels:
    app.kubernetes.io/name: my-db
    app.kubernetes.io/instance: my-db
    app.kubernetes.io/version: "15.3"
    app.kubernetes.io/part-of: my-app
    app.kubernetes.io/managed-by: kubectl
spec:
  serviceName: my-db-headless
  replicas: 3
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: my-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-db
        app.kubernetes.io/instance: my-db
        app.kubernetes.io/version: "15.3"
        app.kubernetes.io/part-of: my-app
        app.kubernetes.io/managed-by: kubectl
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
      - name: my-db
        image: postgres:15.3
        imagePullPolicy: IfNotPresent
        ports:
        - name: db
          containerPort: 5432
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        env:
        - name: POSTGRES_DB
          value: mydb
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: my-db-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: my-db-credentials
              key: password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        app.kubernetes.io/name: my-db
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: standard
      resources:
        requests:
          storage: 10Gi
