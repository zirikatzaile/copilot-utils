apiVersion: v1
kind: ConfigMap
metadata:
  name: my-app-config
  namespace: default
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/instance: my-app
    app.kubernetes.io/part-of: my-app
    app.kubernetes.io/managed-by: kubectl
immutable: false
data:
  APP_ENV: production
  LOG_LEVEL: info
  MAX_CONNECTIONS: "100"
  config.yaml: |
    server:
      port: 8080
      timeout: 30s
    database:
      host: my-db-headless
      port: 5432
      name: mydb
---
apiVersion: v1
kind: Secret
metadata:
  name: my-app-credentials
  namespace: default
  labels:
    app.kubernetes.io/name: my-app
    app.kubernetes.io/instance: my-app
    app.kubernetes.io/part-of: my-app
    app.kubernetes.io/managed-by: kubectl
type: Opaque
immutable: false
# Values must be base64-encoded. Use: echo -n 'value' | base64
data:
  username: bXktdXNlcm5hbWU=
  password: c3VwZXItc2VjcmV0LXBhc3N3b3Jk
  api-key: bXktYXBpLWtleQ==
